name: Build and Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/codespace-backend:latest

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/codespace-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Debug Secrets
        run: |
          echo "Host length: $(echo -n '${{ secrets.EC2_HOST }}' | wc -c)"
          echo "Username length: $(echo -n '${{ secrets.EC2_USERNAME }}' | wc -c)"
          echo "Key MD5: $(echo -n '${{ secrets.EC2_SSH_KEY }}' | tr -d '\r\n ' | md5sum)"

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/codespace-deploy/"

      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/codespace-deploy

            # Log in to GitHub Container Registry on EC2
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Create .env file with all production settings
            echo "BACKEND_IMAGE=ghcr.io/${{ env.OWNER_LC }}/codespace-backend:latest" > .env
            echo "FRONTEND_IMAGE=ghcr.io/${{ env.OWNER_LC }}/codespace-frontend:latest" >> .env
            echo "PORT=8000" >> .env
            echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" >> .env
            echo "REDIS_URL=${{ secrets.REDIS_URL }}" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "ROOM_SECRET=${{ secrets.ROOM_SECRET }}" >> .env
            echo "USER_EMAIL=${{ secrets.USER_EMAIL }}" >> .env
            echo "APP_PASSWORD=${{ secrets.APP_PASSWORD }}" >> .env

            # Pull latest images and restart containers
            docker compose pull
            docker compose down
            docker compose up -d

            # Clean up old unused images
            docker image prune -f
